version: '3'
services:
  registry:
    image: descartesresearch/teastore-registry
    expose:
      - "8080"
    #cpus: "0.25"
    cpus: "0.5"
  db:
    image: descartesresearch/teastore-db
    expose:
      - "3306"
    ports:
      - "3307:3306"
    #cpus: "1.5"
    cpus: "2.0"
  persistence:
    image: descartesresearch/teastore-persistence
    expose:
      - "8080"
    environment:
      HOST_NAME: "persistence"
      REGISTRY_HOST: "registry"
      DB_HOST: "db"
      DB_PORT: "3306"
      #cpus: "1.0"
      cpus: "1.0"
  auth:
    image: descartesresearch/teastore-auth
    expose:
      - "8080"
    environment:
      HOST_NAME: "auth"
      REGISTRY_HOST: "registry"
      #cpus: "0.25"
      cpus: "1.0"
  image:
    image: descartesresearch/teastore-image
    expose:
      - "8080"
    environment:
      HOST_NAME: "image"
      REGISTRY_HOST: "registry"
      #cpus: "1.5"
      cpus: "2"
  recommender:
    image: descartesresearch/teastore-recommender
    expose:
      - "8080"
    environment:
      HOST_NAME: "recommender"
      REGISTRY_HOST: "registry"
      #cpus: "1.0"
      cpus: "1.0"
  webui:
    image: descartesresearch/teastore-webui
    expose:
      - "8080"
    environment:
      HOST_NAME: "webui"
      REGISTRY_HOST: "registry"
    ports:
      - "8080:8080"
    #cpus: "0.25"
    cpus: "0.5"
